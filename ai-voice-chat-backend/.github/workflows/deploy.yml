name: Deploy AI Voice Chat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Deployment
  backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aichat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd ai-voice-chat-backend
        npm ci
    
    - name: Run tests
      run: |
        cd ai-voice-chat-backend
        npm test
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aichat_test
    
    - name: Build frontend
      run: |
        cd ai-voice-chat-backend/frontend
        npm ci
        npm run build
    
    - name: Upload backend artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend
        path: ai-voice-chat-backend/
    
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend
        path: ai-voice-chat-backend/frontend/.next

  # Frontend Deployment
  frontend:
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install and build
      run: |
        cd ai-voice-chat-backend/frontend
        npm ci
        npm run build
    
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: ai-voice-chat-backend/frontend/.next
