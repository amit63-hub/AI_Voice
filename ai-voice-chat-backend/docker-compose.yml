version: '3.8'

services:
  # Backend Service
  backend:
    build: .
    container_name: ai-chat-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./dev.db:/app/dev.db
    restart: unless-stopped

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: ai-chat-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: ai-chat-network
